  to WhatsApp or other destinations.
developer: Mason
website: https://github.com/Blulyk/mason-telegram-forwarder
submitter: Blulyk
submission: https://github.com/Blulyk/mason-telegram-forwarder
repo: https://github.com/Blulyk/mason-telegram-forwarder
support: https://github.com/Blulyk/mason-telegram-forwarder/issues
gallery: []
releaseNotes: >-
  Adds a dashboard button to restart the forwarder without deleting persistent
  config or the Telethon session. Keeps the fixed incoming-message event
  registration and manual monitored-chat filtering.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
