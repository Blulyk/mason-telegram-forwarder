manifestVersion: 1.1
id: mason-telegram-forwarder
name: Telegram Forwarder
tagline: Forward Telegram messages to n8n
icon: https://raw.githubusercontent.com/Blulyk/mason-telegram-forwarder/main/mason-telegram-forwarder/icon.svg
category: automation
