support: https://github.com/Blulyk/mason-telegram-forwarder/issues
gallery: []
releaseNotes: >-
  Fixes Telethon new-message event registration after switching to manual chat
  filtering, so incoming Telegram messages from monitored chats trigger the
  forwarder correctly.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
