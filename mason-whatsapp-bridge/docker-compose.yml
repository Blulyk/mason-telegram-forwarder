services:
  app_proxy:
    environment:
      APP_HOST: mason-whatsapp-bridge_server_1
      APP_PORT: 8090
      PROXY_AUTH_WHITELIST: "/api/*"

  server:
    image: ghcr.io/blulyk/whatsapp-bridge:0.1.0
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PORT: 8090
      API_KEY: ${APP_PASSWORD}
      DATA_DIR: /data
      MAX_BODY_SIZE: 25mb
    volumes:
      - ${APP_DATA_DIR}/data:/data
